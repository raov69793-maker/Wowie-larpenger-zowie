<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Larpessenger</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#17212b">
  <style>
    /* CSS Переменные по умолчанию (Telegram Dark) */
    :root {
      --bg-main: #0e1621;
      --bg-card: #17212b;
      --accent-color: #5288c1;
      --accent-active: #2b5278;
      --text-main: #ffffff;
      --text-sub: #7f91a4;
      --border-color: #101419;
      --msg-peer: #182533;
      --chat-bg-image: radial-gradient(#17212b 1px, transparent 0);
      --chat-bg-color: #0e1621;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    html, body { height: 100%; height: 100svh; background: var(--bg-main); color: var(--text-main); overflow: hidden; display: flex; flex-direction: column; transition: background 0.3s; }
    
    /* Окно Авторизации */
    #auth-screen { position: fixed; inset: 0; background: var(--bg-main); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { background: var(--bg-card); border-radius: 16px; padding: 24px; width: 100%; max-width: 360px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; }
    .auth-card h2 { color: var(--accent-color); margin-bottom: 8px; }
    .auth-card p { font-size: 13px; color: var(--text-sub); margin-bottom: 20px; }
    .auth-input { width: 100%; padding: 12px 14px; background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 10px; margin-bottom: 12px; outline: none; font-size: 14px; }
    .auth-btn { width: 100%; padding: 12px; background: var(--accent-color); border: none; color: #fff; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; }

    /* Главный экран */
    #main-screen { display: flex; flex-direction: column; height: 100%; width: 100%; }

    /* Шапка Telegram style */
    .app-header { background: var(--bg-card); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
    .app-title { font-weight: 600; font-size: 18px; color: var(--text-main); }

    /* Поиск */
    .search-container { background: var(--bg-card); padding: 8px 12px; display: flex; gap: 8px; flex-shrink: 0; }
    .search-container input { flex: 1; padding: 10px 14px; background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 10px; outline: none; font-size: 14px; }
    .search-container button { padding: 10px 14px; background: var(--accent-color); color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }

    /* Список чатов */
    #chats-list-vertical { flex: 1; overflow-y: auto; background: var(--bg-main); display: flex; flex-direction: column; }
    .chat-row { display: flex; align-items: center; padding: 12px 16px; gap: 12px; border-bottom: 1px solid var(--border-color); cursor: pointer; position: relative; }
    .chat-row:active { background: var(--bg-card); }
    .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--accent-active); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; flex-shrink: 0; object-fit: cover; color: #fff; }
    .chat-info { flex: 1; overflow: hidden; }
    .chat-name { font-weight: 600; font-size: 15px; color: var(--text-main); margin-bottom: 4px; }
    .chat-preview { font-size: 13px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Бэдж непрочитанных */
    .unread-badge { background: var(--accent-color); color: #fff; font-size: 12px; font-weight: bold; min-width: 22px; height: 22px; border-radius: 11px; padding: 0 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* Нижняя панель навигации */
    .bottom-nav { background: var(--bg-card); height: 56px; display: flex; border-top: 1px solid var(--border-color); flex-shrink: 0; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sub); font-size: 11px; background: none; border: none; cursor: pointer; gap: 3px; }
    .nav-btn.active { color: var(--accent-color); }
    .nav-btn span { font-size: 18px; }

    /* Экран чата */
    #chat-screen { position: fixed; inset: 0; background: var(--bg-main); z-index: 1000; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.2s ease-in-out; }
    #chat-screen.active { transform: translateX(0); }

    .chat-header { background: var(--bg-card); padding: 10px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
    .back-btn { background: none; border: none; color: var(--accent-color); font-size: 20px; cursor: pointer; padding-right: 8px; }
    .chat-header-user { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; }

    /* Обои Чата */
    #chat-box { 
      flex: 1; 
      padding: 12px; 
      overflow-y: auto; 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
      background-color: var(--chat-bg-color); 
      background-image: var(--chat-bg-image); 
      background-size: cover; 
      background-position: center; 
    }
    
    .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-break: break-word; }
    .msg.me { background: var(--accent-active); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
    .msg.peer { background: var(--msg-peer); color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
    .msg-time { font-size: 10px; color: rgba(255,255,255,0.6); float: right; margin-left: 8px; margin-top: 4px; }

    .input-bar { background: var(--bg-card); padding: 8px 12px; display: flex; gap: 8px; align-items: center; border-top: 1px solid var(--border-color); flex-shrink: 0; }
    .input-bar input { flex: 1; padding: 10px 14px; background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 20px; outline: none; font-size: 14px; }
    .input-bar button { background: var(--accent-color); border: none; width: 40px; height: 40px; border-radius: 50%; color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

    /* Модальные окна */
    .modal-overlay { position: fixed; inset: 0; background: var(--bg-main); z-index: 1500; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
    .modal-overlay.active { display: flex; }
    .profile-card { background: var(--bg-card); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 16px; align-items: center; width: 100%; max-width: 400px; margin: 0 auto; }
    
    .avatar-upload-wrapper { position: relative; cursor: pointer; }
    .avatar-upload-wrapper:hover::after { content: '📷'; position: absolute; inset: 0; background: rgba(0,0,0,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .profile-avatar-preview { width: 100px; height: 100px; border-radius: 50%; background: var(--accent-active); object-fit: cover; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; color: #fff; }

    /* Кастомизация интерфейса */
    .custom-section { width: 100%; text-align: left; }
    .custom-section h4 { font-size: 14px; color: var(--text-sub); margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 4px; }
    
    .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
    .theme-circle { width: 100%; aspect-ratio: 1; border-radius: 50%; cursor: pointer; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .theme-circle.active { border-color: var(--text-main); scale: 1.1; }

    #error-box { position: fixed; top: 0; left: 0; right: 0; background: rgba(255,0,0,0.9); color: white; padding: 8px; font-size: 11px; z-index: 9999; display: none; }
  </style>
</head>
<body>

  <div id="error-box"></div>

  <!-- Окно Авторизации -->
  <div id="auth-screen">
    <div class="auth-card">
      <h2>Larpessenger 🚀</h2>
      <p>Введите ваш @username для входа</p>
      <input type="text" id="reg-username" class="auth-input" placeholder="например: raov">
      <button id="btn-register" class="auth-btn">Войти</button>
    </div>
  </div>

  <!-- Главный экран -->
  <div id="main-screen">
    <div class="app-header">
      <div class="app-title">Larpessenger</div>
      <button id="btn-push" style="background:none; border:none; font-size:18px; cursor:pointer;">🔔</button>
    </div>

    <div class="search-container">
      <input type="text" id="target-username" placeholder="Поиск чатов">
      <button id="btn-start-chat">+</button>
    </div>

    <div id="chats-list-vertical"></div>

    <div class="bottom-nav">
      <button class="nav-btn active" id="nav-chats"><span>💬</span>Чаты</button>
      <button class="nav-btn" id="nav-profile"><span>⚙️</span>Настройки</button>
    </div>
  </div>

  <!-- Экран чата -->
  <div id="chat-screen">
    <div class="chat-header">
      <button class="back-btn" id="btn-back">➔</button>

      <div class="chat-header-user" id="btn-open-peer-profile">
        <img id="chat-peer-avatar" class="avatar" style="width:38px; height:38px; display:none;">
        <div id="chat-peer-avatar-ph" class="avatar" style="width:38px; height:38px;">?</div>
        <div>
          <div id="chat-peer-title" class="chat-name">@username</div>
          <div style="font-size:12px; color:var(--accent-color);">в сети</div>
        </div>
      </div>
    </div>

    <div id="chat-box"></div>

    <div class="input-bar">
      <input type="text" id="msg-input" placeholder="Написать сообщение...">
      <button id="btn-send">➔</button>
    </div>
  </div>

  <!-- Настройки И Кастомизация -->
  <div id="profile-modal" class="modal-overlay">
    <div class="app-header" style="background:transparent; padding:0 0 16px 0;">
      <div class="app-title">Настройки и Кастомизация</div>
      <button id="btn-close-profile" style="background:none; border:none; color:var(--accent-color); font-size:16px;">Закрыть</button>
    </div>
    
    <div class="profile-card">
      <div class="avatar-upload-wrapper" id="btn-trigger-file">
        <div id="profile-avatar-ph" class="profile-avatar-preview">?</div>
        <img id="profile-avatar-img" class="profile-avatar-preview" style="display:none;">
      </div>
      <input type="file" id="avatar-file-input" accept="image/*" style="display:none;">
      <p id="profile-username-text" style="font-weight:600; font-size:18px; color:var(--text-main);"></p>
      <button id="btn-choose-file" class="auth-btn">Сменить фото профиля 📷</button>
      <p id="upload-status" style="font-size:12px; color:var(--text-sub); display:none;">Сжатие и загрузка...</p>

      <!-- КАСТОМИЗАЦИЯ ТЕМЫ -->
      <div class="custom-section">
        <h4>🎨 Цветовая тема приложения</h4>
        <div class="theme-grid">
          <div class="theme-circle" style="background: #17212b; border: 2px solid #5288c1;" onclick="applyTheme('default')">Dark</div>
          <div class="theme-circle" style="background: #0f172a; border: 2px solid #38bdf8;" onclick="applyTheme('midnight')">Blue</div>
          <div class="theme-circle" style="background: #18181b; border: 2px solid #a855f7;" onclick="applyTheme('cyberpunk')">Purple</div>
          <div class="theme-circle" style="background: #052e16; border: 2px solid #22c55e;" onclick="applyTheme('forest')">Forest</div>
        </div>
      </div>

      <!-- КАСТОМИЗАЦИЯ ОБОЕВ ЧАТА -->
      <div class="custom-section">
        <h4>🖼️ Обои в чате</h4>
        <button id="btn-bg-file" class="auth-btn" style="background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main); margin-bottom: 8px;">Загрузить свое фото на фон 🏞️</button>
        <button onclick="resetChatWallpaper()" class="auth-btn" style="background: transparent; color: var(--text-sub); font-size: 13px; padding: 4px;">Сбросить обои до дефолтных</button>
        <input type="file" id="bg-file-input" accept="image/*" style="display:none;">
      </div>

    </div>
  </div>

  <!-- ЧУЖОЙ ПРОФИЛЬ -->
  <div id="peer-profile-modal" class="modal-overlay">
    <div class="app-header" style="background:transparent; padding:0 0 16px 0;">
      <div class="app-title">Профиль пользователя</div>
      <button id="btn-close-peer-profile" style="background:none; border:none; color:var(--accent-color); font-size:16px;">Закрыть</button>
    </div>
    <div class="profile-card">
      <div>
        <div id="peer-modal-avatar-ph" class="profile-avatar-preview">?</div>
        <img id="peer-modal-avatar-img" class="profile-avatar-preview" style="display:none;">
      </div>
      <p id="peer-modal-username-text" style="font-weight:600; font-size:20px; color:var(--text-main);"></p>
    </div>
  </div>

  <script>
    window.onerror = function(msg, url, line) {
      const box = document.getElementById('error-box');
      box.style.display = 'block';
      box.innerHTML += `❌ ${msg} (стр. ${line})<br>`;
    };
  </script>

  <!-- Firebase SDK & JS Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDoc, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJsk9oUrKLMV0L7tgyxTzMZ-WgRwVgYDA",
      authDomain: "larpessenger.firebaseapp.com",
      projectId: "larpessenger",
      storageBucket: "larpessenger.firebasestorage.app",
      messagingSenderId: "25247732078",
      appId: "1:25247732078:web:cf9fca7a55f452ba1b317f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentUser = localStorage.getItem("larp_username") || null;
    let activePeer = null;
    let currentRoom = null;
    let unsubscribeChat = null;
    let chatListeners = {};
    let unreadCounts = {};
    let myChats = JSON.parse(localStorage.getItem("larp_chats") || "[]");
    let usersCache = {};

    // ПРЕДУСТАНОВЛЕННЫЕ ТЕМЫ
    const themes = {
      default: {
        '--bg-main': '#0e1621',
        '--bg-card': '#17212b',
        '--accent-color': '#5288c1',
        '--accent-active': '#2b5278',
        '--text-main': '#ffffff',
        '--text-sub': '#7f91a4',
        '--border-color': '#101419',
        '--msg-peer': '#182533',
        '--chat-bg-color': '#0e1621',
        '--chat-bg-image': 'radial-gradient(#17212b 1px, transparent 0)'
      },
      midnight: {
        '--bg-main': '#030712',
        '--bg-card': '#0f172a',
        '--accent-color': '#38bdf8',
        '--accent-active': '#0284c7',
        '--text-main': '#f8fafc',
        '--text-sub': '#64748b',
        '--border-color': '#1e293b',
        '--msg-peer': '#1e293b',
        '--chat-bg-color': '#030712',
        '--chat-bg-image': 'none'
      },
      cyberpunk: {
        '--bg-main': '#09090b',
        '--bg-card': '#18181b',
        '--accent-color': '#a855f7',
        '--accent-active': '#7e22ce',
        '--text-main': '#fafafa',
        '--text-sub': '#a1a1aa',
        '--border-color': '#27272a',
        '--msg-peer': '#27272a',
        '--chat-bg-color': '#09090b',
        '--chat-bg-image': 'none'
      },
      forest: {
        '--bg-main': '#022c22',
        '--bg-card': '#064e3b',
        '--accent-color': '#22c55e',
        '--accent-active': '#15803d',
        '--text-main': '#ecfdf5',
        '--text-sub': '#6ee7b7',
        '--border-color': '#065f46',
        '--msg-peer': '#065f46',
        '--chat-bg-color': '#022c22',
        '--chat-bg-image': 'none'
      }
    };

    // Применение темы
    window.applyTheme = function(themeName) {
      const theme = themes[themeName] || themes.default;
      for (let key in theme) {
        document.documentElement.style.setProperty(key, theme[key]);
      }
      localStorage.setItem("larp_theme", themeName);

      // Восстанавливаем кастомные обои если есть
      const savedBg = localStorage.getItem("larp_custom_bg");
      if (savedBg) {
        document.documentElement.style.setProperty('--chat-bg-image', `url(${savedBg})`);
      }
    };

    // Загрузка кастомных обоев
    const bgFileInput = document.getElementById('bg-file-input');
    document.getElementById('btn-bg-file').addEventListener('click', () => bgFileInput.click());

    bgFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          
          // Масштабируем обои до HD разрешения для экономии памяти
          const maxWidth = 1080;
          const scale = maxWidth / img.width;
          canvas.width = maxWidth;
          canvas.height = img.height * scale;

          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const base64Url = canvas.toDataURL('image/jpeg', 0.7);

          localStorage.setItem("larp_custom_bg", base64Url);
          document.documentElement.style.setProperty('--chat-bg-image', `url(${base64Url})`);
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    window.resetChatWallpaper = function() {
      localStorage.removeItem("larp_custom_bg");
      const currentTheme = localStorage.getItem("larp_theme") || "default";
      applyTheme(currentTheme);
    };

    // При старте загружаем тему
    applyTheme(localStorage.getItem("larp_theme") || "default");

    if (currentUser) {
      document.getElementById('auth-screen').style.display = 'none';
      initApp();
    }

    document.getElementById('btn-register').addEventListener('click', () => {
      const input = document.getElementById('reg-username').value.toLowerCase().replace('@', '').trim();
      if (!input) return;

      currentUser = input;
      localStorage.setItem("larp_username", input);
      setDoc(doc(db, "users", input), { username: input }, { merge: true });

      document.getElementById('auth-screen').style.display = 'none';
      initApp();
    });

    function initApp() {
      loadUserData(currentUser);
      renderChatsList();
      listenToAllChatsUnread();
    }

    async function loadUserData(username) {
      if (usersCache[username]) return usersCache[username];
      try {
        const snap = await getDoc(doc(db, "users", username));
        if (snap.exists()) {
          usersCache[username] = snap.data();
          return snap.data();
        }
      } catch(e) { console.error(e); }
      return null;
    }

    function getPrivateChatId(userA, userB) {
      return [userA.toLowerCase().trim(), userB.toLowerCase().trim()].sort().join("_");
    }

    function listenToAllChatsUnread() {
      myChats.forEach(peer => {
        const roomId = getPrivateChatId(currentUser, peer);
        if (chatListeners[roomId]) return;

        unreadCounts[peer] = unreadCounts[peer] || 0;
        let isInitialLoad = true;

        const q = query(collection(db, "chats", roomId, "messages"), orderBy("timestamp", "asc"));
        
        chatListeners[roomId] = onSnapshot(q, (snapshot) => {
          if (isInitialLoad) {
            isInitialLoad = false;
            return;
          }

          snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
              const msg = change.doc.data();
              if (msg.author.toLowerCase() !== currentUser.toLowerCase() && activePeer !== peer) {
                unreadCounts[peer] = (unreadCounts[peer] || 0) + 1;
                updateUnreadBadge(peer);
              }
            }
          });
        });
      });
    }

    function updateUnreadBadge(peer) {
      const badge = document.getElementById(`unread-badge-${peer}`);
      if (badge) {
        const count = unreadCounts[peer] || 0;
        if (count > 0) {
          badge.innerText = count;
          badge.style.display = 'flex';
        } else {
          badge.style.display = 'none';
        }
      }
    }

    async function renderChatsList() {
      const container = document.getElementById('chats-list-vertical');
      container.innerHTML = '';

      if (myChats.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding: 40px; color:var(--text-sub); font-size:14px;">Нет чатов.<br>Введи @username сверху и нажми +</div>`;
        return;
      }

      for (let user of myChats) {
        const uData = await loadUserData(user);
        const row = document.createElement('div');
        row.className = 'chat-row';
        
        let avatarHtml = `<div class="avatar">${user[0].toUpperCase()}</div>`;
        if (uData && uData.avatarUrl) {
          avatarHtml = `<img src="${uData.avatarUrl}" class="avatar">`;
        }

        const count = unreadCounts[user] || 0;

        row.innerHTML = `
          ${avatarHtml}
          <div class="chat-info">
            <div class="chat-name">@${user}</div>
            <div class="chat-preview">Нажмите, чтобы открыть диалог</div>
          </div>
          <div id="unread-badge-${user}" class="unread-badge" style="display: ${count > 0 ? 'flex' : 'none'};">
            ${count}
          </div>
        `;

        row.onclick = () => openChatWith(user);
        container.appendChild(row);
      }
    }

    async function openChatWith(targetUser) {
      activePeer = targetUser;
      unreadCounts[targetUser] = 0;
      updateUnreadBadge(targetUser);

      if (!myChats.includes(targetUser) && targetUser !== currentUser) {
        myChats.push(targetUser);
        localStorage.setItem("larp_chats", JSON.stringify(myChats));
        listenToAllChatsUnread();
      }

      currentRoom = getPrivateChatId(currentUser, targetUser);
      document.getElementById('chat-peer-title').innerText = `@${targetUser}`;

      const uData = await loadUserData(targetUser);
      const imgEl = document.getElementById('chat-peer-avatar');
      const phEl = document.getElementById('chat-peer-avatar-ph');
      
      if (uData && uData.avatarUrl) {
        imgEl.src = uData.avatarUrl;
        imgEl.style.display = 'block';
        phEl.style.display = 'none';
      } else {
        phEl.innerText = targetUser[0].toUpperCase();
        phEl.style.display = 'flex';
        imgEl.style.display = 'none';
      }

      document.getElementById('chat-screen').classList.add('active');

      if (unsubscribeChat) unsubscribeChat();

      const messagesRef = collection(db, "chats", currentRoom, "messages");
      const q = query(messagesRef, orderBy("timestamp", "asc"));

      unsubscribeChat = onSnapshot(q, (snapshot) => {
        document.getElementById('chat-box').innerHTML = '';
        snapshot.forEach((doc) => appendMessage(doc.data()));
      });
    }

    document.getElementById('btn-back').addEventListener('click', () => {
      activePeer = null;
      document.getElementById('chat-screen').classList.remove('active');
      renderChatsList();
    });

    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();

      if (text && currentRoom) {
        input.value = '';
        await addDoc(collection(db, "chats", currentRoom, "messages"), {
          text: text,
          author: currentUser,
          timestamp: serverTimestamp()
        });
      }
    }

    function appendMessage(data) {
      const box = document.getElementById('chat-box');
      const isMe = data.author.toLowerCase() === currentUser.toLowerCase();

      const div = document.createElement('div');
      div.className = `msg ${isMe ? 'me' : 'peer'}`;

      let timeStr = "";
      if (data.timestamp) {
        const date = data.timestamp.toDate();
        timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      div.innerHTML = `
        <span class="msg-text"></span>
        <span class="msg-time">${timeStr}</span>
      `;
      div.querySelector('.msg-text').innerText = data.text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    document.getElementById('btn-start-chat').addEventListener('click', () => {
      const target = document.getElementById('target-username').value.replace('@', '').trim();
      if (target) {
        openChatWith(target);
        document.getElementById('target-username').value = '';
      }
    });

    document.getElementById('btn-send').addEventListener('click', sendMessage);
    document.getElementById('msg-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Чужой профиль
    document.getElementById('btn-open-peer-profile').addEventListener('click', async () => {
      if (!activePeer) return;

      document.getElementById('peer-modal-username-text').innerText = `@${activePeer}`;
      const uData = await loadUserData(activePeer);

      const imgEl = document.getElementById('peer-modal-avatar-img');
      const phEl = document.getElementById('peer-modal-avatar-ph');

      if (uData && uData.avatarUrl) {
        imgEl.src = uData.avatarUrl;
        imgEl.style.display = 'block';
        phEl.style.display = 'none';
      } else {
        phEl.innerText = activePeer[0].toUpperCase();
        phEl.style.display = 'flex';
        imgEl.style.display = 'none';
      }

      document.getElementById('peer-profile-modal').classList.add('active');
    });

    document.getElementById('btn-close-peer-profile').addEventListener('click', () => {
      document.getElementById('peer-profile-modal').classList.remove('active');
    });

    // Настройки
    document.getElementById('nav-profile').addEventListener('click', async () => {
      document.getElementById('profile-modal').classList.add('active');
      document.getElementById('profile-username-text').innerText = `@${currentUser}`;
      
      const myData = await loadUserData(currentUser);
      if (myData && myData.avatarUrl) {
        document.getElementById('profile-avatar-img').src = myData.avatarUrl;
        document.getElementById('profile-avatar-img').style.display = 'block';
        document.getElementById('profile-avatar-ph').style.display = 'none';
      } else {
        document.getElementById('profile-avatar-ph').innerText = currentUser[0].toUpperCase();
      }
    });

    document.getElementById('btn-close-profile').addEventListener('click', () => {
      document.getElementById('profile-modal').classList.remove('active');
    });

    // Аватарка
    const fileInput = document.getElementById('avatar-file-input');
    document.getElementById('btn-choose-file').addEventListener('click', () => fileInput.click());
    document.getElementById('btn-trigger-file').addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const status = document.getElementById('upload-status');
      status.style.display = 'block';

      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          const size = 200;
          canvas.width = size;
          canvas.height = size;

          const minDim = Math.min(img.width, img.height);
          const sx = (img.width - minDim) / 2;
          const sy = (img.height - minDim) / 2;

          ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, size, size);

          const base64Url = canvas.toDataURL('image/jpeg', 0.8);

          setDoc(doc(db, "users", currentUser), { avatarUrl: base64Url }, { merge: true }).then(() => {
            usersCache[currentUser] = { avatarUrl: base64Url };
            document.getElementById('profile-avatar-img').src = base64Url;
            document.getElementById('profile-avatar-img').style.display = 'block';
            document.getElementById('profile-avatar-ph').style.display = 'none';
            status.style.display = 'none';
            renderChatsList();
          });
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
