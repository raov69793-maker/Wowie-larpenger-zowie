<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Larpessenger</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#17212b">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    /* Используем svh для корректного отображения в мобильных браузерах */
    html, body { height: 100%; height: 100svh; background: #0e1621; color: #fff; overflow: hidden; display: flex; flex-direction: column; }
    
    /* Окно авторизации / регистрации */
    #auth-screen { position: fixed; inset: 0; background: #0e1621; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { background: #17212b; border-radius: 16px; padding: 24px; width: 100%; max-width: 360px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; }
    .auth-card h2 { color: #5288c1; margin-bottom: 8px; }
    .auth-card p { font-size: 13px; color: #7f91a4; margin-bottom: 20px; }
    .auth-input { width: 100%; padding: 12px 14px; background: #0e1621; border: 1px solid #242f3d; color: #fff; border-radius: 10px; margin-bottom: 12px; outline: none; font-size: 14px; }
    .auth-btn { width: 100%; padding: 12px; background: #5288c1; border: none; color: #fff; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; }

    /* Шапка */
    .header { background: #17212b; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #101419; flex-shrink: 0; }
    .header-info { display: flex; flex-direction: column; }
    .header-title { font-weight: 600; font-size: 16px; color: #f5f5f5; }
    .header-status { font-size: 12px; color: #64b5f6; }

    /* Поиск */
    .search-bar { background: #17212b; padding: 8px 12px; display: flex; gap: 8px; border-bottom: 1px solid #101419; flex-shrink: 0; }
    .search-bar input { flex: 1; padding: 8px 12px; background: #0e1621; border: 1px solid #242f3d; color: #fff; border-radius: 8px; outline: none; font-size: 13px; }
    .search-bar button { padding: 8px 14px; background: #2b5278; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }

    /* Список диалогов */
    #chats-list { display: flex; gap: 8px; padding: 8px 12px; background: #17212b; overflow-x: auto; border-bottom: 1px solid #101419; flex-shrink: 0; min-height: 45px; }
    .chat-item { background: #242f3d; padding: 6px 12px; border-radius: 16px; font-size: 12px; white-space: nowrap; cursor: pointer; border: 1px solid transparent; }
    .chat-item.active { background: #2b5278; border-color: #64b5f6; }

    /* Чат-зона */
    #chat-box { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background-color: #0e1621; background-image: radial-gradient(#17212b 1px, transparent 0); background-size: 16px 16px; }

    /* Сообщения */
    .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; position: relative; word-break: break-word; }
    .msg.me { background: #2b5278; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
    .msg.peer { background: #182533; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
    .msg-author { font-size: 11px; font-weight: bold; margin-bottom: 3px; color: #64b5f6; }
    .msg.me .msg-author { display: none; }
    .msg-time { font-size: 10px; color: rgba(255,255,255,0.5); float: right; margin-left: 8px; margin-top: 4px; }

    /* Панель ввода — прижимается жестко к низу */
    .input-bar { background: #17212b; padding: 8px 12px; display: flex; gap: 8px; align-items: center; border-top: 1px solid #101419; flex-shrink: 0; }
    .input-bar input { flex: 1; padding: 10px 14px; background: #0e1621; border: 1px solid #242f3d; color: #fff; border-radius: 20px; outline: none; font-size: 14px; }
    .input-bar button { background: #5288c1; border: none; width: 40px; height: 40px; border-radius: 50%; color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

    #error-box { position: fixed; top: 0; left: 0; right: 0; background: rgba(255,0,0,0.9); color: white; padding: 8px; font-size: 11px; z-index: 9999; display: none; }
  </style>
</head>
<body>

  <div id="error-box"></div>

  <!-- Окно Авторизации -->
  <div id="auth-screen">
    <div class="auth-card">
      <h2>Larpessenger 🚀</h2>
      <p>Придумай уникальный @username для входа</p>
      <input type="text" id="reg-username" class="auth-input" placeholder="Юзернейм (например: raov)">
      <button id="btn-register" class="auth-btn">Войти / Зарегистрироваться</button>
    </div>
  </div>

  <!-- Шапка -->
  <div class="header">
    <div class="header-info">
      <div class="header-title" id="my-profile-name">@...</div>
      <div class="header-status" id="chat-status">Выбери чат</div>
    </div>
    <button id="btn-push" style="background:none; border:none; font-size:18px; cursor:pointer;">🔔</button>
  </div>

  <!-- Поиск -->
  <div class="search-bar">
    <input type="text" id="target-username" placeholder="Найти собеседника по @username">
    <button id="btn-start-chat">Написать</button>
  </div>

  <!-- Список чатов -->
  <div id="chats-list"></div>

  <!-- Чат-зона -->
  <div id="chat-box"></div>

  <!-- Панель ввода -->
  <div class="input-bar">
    <input type="text" id="msg-input" placeholder="Написать сообщение..." disabled>
    <button id="btn-send" disabled>➔</button>
  </div>

  <!-- Вывод JS-ошибок на экран при необходимости -->
  <script>
    window.onerror = function(msg, url, line) {
      const box = document.getElementById('error-box');
      box.style.display = 'block';
      box.innerHTML += `❌ ${msg} (стр. ${line})<br>`;
    };
  </script>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJsk9oUrKLMV0L7tgyxTzMZ-WgRwVgYDA",
      authDomain: "larpessenger.firebaseapp.com",
      projectId: "larpessenger",
      storageBucket: "larpessenger.firebasestorage.app",
      messagingSenderId: "25247732078",
      appId: "1:25247732078:web:cf9fca7a55f452ba1b317f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const messaging = getMessaging(app);
    const vapidKey = "BJ8SpCv5f19isktlc5ZN35BGwV62A1wgqzGBaZn60vKQnnn-z5SLCUs4pn7tkbtDYoWqPcp99aFb066iQ0XQFB8";

    let currentUser = localStorage.getItem("larp_username") || null;
    let currentRoom = null;
    let unsubscribe = null;
    let myChats = JSON.parse(localStorage.getItem("larp_chats") || "[]");

    // 1. Авторизация
    if (currentUser) {
      document.getElementById('auth-screen').style.display = 'none';
      initApp();
    }

    document.getElementById('btn-register').addEventListener('click', () => {
      const input = document.getElementById('reg-username').value.toLowerCase().replace('@', '').trim();
      if (!input) return;

      currentUser = input;
      localStorage.setItem("larp_username", input);

      try {
        setDoc(doc(db, "users", input), { lastLogin: serverTimestamp() }, { merge: true });
      } catch(e) { console.error(e); }

      document.getElementById('auth-screen').style.display = 'none';
      initApp();
    });

    function initApp() {
      document.getElementById('my-profile-name').innerText = `@${currentUser}`;
      renderChatsList();
    }

    // 2. Логика чатов
    function getPrivateChatId(userA, userB) {
      return [userA.toLowerCase().trim(), userB.toLowerCase().trim()].sort().join("_");
    }

    function addChatToList(targetUser) {
      if (!myChats.includes(targetUser) && targetUser !== currentUser) {
        myChats.push(targetUser);
        localStorage.setItem("larp_chats", JSON.stringify(myChats));
      }
      renderChatsList();
    }

    function renderChatsList() {
      const container = document.getElementById('chats-list');
      container.innerHTML = '';
      myChats.forEach(user => {
        const item = document.createElement('div');
        item.className = `chat-item ${currentRoom === getPrivateChatId(currentUser, user) ? 'active' : ''}`;
        item.innerText = `@${user}`;
        item.onclick = () => openChatWith(user);
        container.appendChild(item);
      });
    }

    function openChatWith(targetUser) {
      addChatToList(targetUser);
      currentRoom = getPrivateChatId(currentUser, targetUser);
      
      document.getElementById('chat-status').innerText = `Диалог с @${targetUser}`;
      document.getElementById('msg-input').disabled = false;
      document.getElementById('btn-send').disabled = false;

      renderChatsList();

      if (unsubscribe) unsubscribe();

      const messagesRef = collection(db, "chats", currentRoom, "messages");
      const q = query(messagesRef, orderBy("timestamp", "asc"));

      unsubscribe = onSnapshot(q, (snapshot) => {
        document.getElementById('chat-box').innerHTML = '';
        snapshot.forEach((doc) => {
          appendMessage(doc.data());
        });
      }, (err) => {
        console.error("Firestore error:", err);
      });
    }

    // 3. Отправка сообщений
    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();

      if (text && currentRoom) {
        input.value = '';
        await addDoc(collection(db, "chats", currentRoom, "messages"), {
          text: text,
          author: currentUser,
          timestamp: serverTimestamp()
        });
      }
    }

    function appendMessage(data) {
      const box = document.getElementById('chat-box');
      const isMe = data.author.toLowerCase() === currentUser.toLowerCase();

      const div = document.createElement('div');
      div.className = `msg ${isMe ? 'me' : 'peer'}`;

      let timeStr = "";
      if (data.timestamp) {
        const date = data.timestamp.toDate();
        timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      div.innerHTML = `
        <div class="msg-author">@${data.author}</div>
        <span class="msg-text"></span>
        <span class="msg-time">${timeStr}</span>
      `;
      
      div.querySelector('.msg-text').innerText = data.text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    // События
    document.getElementById('btn-start-chat').addEventListener('click', () => {
      const target = document.getElementById('target-username').value.replace('@', '').trim();
      if (target) {
        openChatWith(target);
        document.getElementById('target-username').value = '';
      }
    });

    document.getElementById('btn-send').addEventListener('click', sendMessage);
    document.getElementById('msg-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Пуш уведомления
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then((registration) => {
        document.getElementById('btn-push').addEventListener('click', async () => {
          const permission = await Notification.requestPermission();
          if (permission === 'granted') {
            await getToken(messaging, { vapidKey, serviceWorkerRegistration: registration });
            alert('Уведомления включены!');
          }
        });
      });
    }
  </script>
</body>
</html>
