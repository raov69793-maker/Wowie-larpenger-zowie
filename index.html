<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Larpessenger</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#17212b">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    html, body { height: 100%; height: 100svh; background: #0e1621; color: #fff; overflow: hidden; display: flex; flex-direction: column; }
    
    /* Окно Авторизации */
    #auth-screen { position: fixed; inset: 0; background: #0e1621; z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { background: #17212b; border-radius: 16px; padding: 24px; width: 100%; max-width: 360px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; }
    .auth-card h2 { color: #5288c1; margin-bottom: 8px; }
    .auth-card p { font-size: 13px; color: #7f91a4; margin-bottom: 20px; }
    .auth-input { width: 100%; padding: 12px 14px; background: #0e1621; border: 1px solid #242f3d; color: #fff; border-radius: 10px; margin-bottom: 12px; outline: none; font-size: 14px; }
    .auth-btn { width: 100%; padding: 12px; background: #5288c1; border: none; color: #fff; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; }

    /* Экран со списком чатов (Главный) */
    #main-screen { display: flex; flex-direction: column; height: 100%; width: 100%; }

    /* Шапка Telegram style */
    .app-header { background: #17212b; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #101419; flex-shrink: 0; }
    .app-title { font-weight: 600; font-size: 18px; color: #f5f5f5; }

    /* Поиск */
    .search-container { background: #17212b; padding: 8px 12px; display: flex; gap: 8px; flex-shrink: 0; }
    .search-container input { flex: 1; padding: 10px 14px; background: #0e1621; border: 1px solid #242f3d; color: #fff; border-radius: 10px; outline: none; font-size: 14px; }
    .search-container button { padding: 10px 14px; background: #5288c1; color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }

    /* Вертикальный список чатов в столбик */
    #chats-list-vertical { flex: 1; overflow-y: auto; background: #0e1621; display: flex; flex-direction: column; }
    .chat-row { display: flex; align-items: center; padding: 12px 16px; gap: 12px; border-bottom: 1px solid #17212b; cursor: pointer; }
    .chat-row:active { background: #17212b; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; background: #2b5278; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; flex-shrink: 0; object-fit: cover; }
    .chat-info { flex: 1; overflow: hidden; }
    .chat-name { font-weight: 600; font-size: 15px; color: #fff; margin-bottom: 4px; }
    .chat-preview { font-size: 13px; color: #7f91a4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Нижняя панель навигации */
    .bottom-nav { background: #17212b; height: 56px; display: flex; border-top: 1px solid #101419; flex-shrink: 0; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #7f91a4; font-size: 11px; background: none; border: none; cursor: pointer; gap: 3px; }
    .nav-btn.active { color: #5288c1; }
    .nav-btn span { font-size: 18px; }

    /* Экран чата (Выплывает поверх основного) */
    #chat-screen { position: fixed; inset: 0; background: #0e1621; z-index: 1000; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.2s ease-in-out; }
    #chat-screen.active { transform: translateX(0); }

    .chat-header { background: #17212b; padding: 10px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #101419; flex-shrink: 0; }
    .back-btn { background: none; border: none; color: #5288c1; font-size: 20px; cursor: pointer; padding-right: 8px; }

    /* Сообщения */
    #chat-box { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background-color: #0e1621; background-image: radial-gradient(#17212b 1px, transparent 0); background-size: 16px 16px; }
    .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-break: break-word; }
    .msg.me { background: #2b5278; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
    .msg.peer { background: #182533; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
    .msg-time { font-size: 10px; color: rgba(255,255,255,0.5); float: right; margin-left: 8px; margin-top: 4px; }

    .input-bar { background: #17212b; padding: 8px 12px; display: flex; gap: 8px; align-items: center; border-top: 1px solid #101419; flex-shrink: 0; }
    .input-bar input { flex: 1; padding: 10px 14px; background: #0e1621; border: 1px solid #242f3d; color: #fff; border-radius: 20px; outline: none; font-size: 14px; }
    .input-bar button { background: #5288c1; border: none; width: 40px; height: 40px; border-radius: 50%; color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

    /* Окно профиля */
    #profile-modal { position: fixed; inset: 0; background: #0e1621; z-index: 1500; display: none; flex-direction: column; padding: 20px; }
    #profile-modal.active { display: flex; }
    .profile-card { background: #17212b; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
    .profile-avatar-preview { width: 90px; height: 90px; border-radius: 50%; background: #2b5278; object-fit: cover; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; }

    #error-box { position: fixed; top: 0; left: 0; right: 0; background: rgba(255,0,0,0.9); color: white; padding: 8px; font-size: 11px; z-index: 9999; display: none; }
  </style>
</head>
<body>

  <div id="error-box"></div>

  <!-- Окно Авторизации -->
  <div id="auth-screen">
    <div class="auth-card">
      <h2>Larpessenger 🚀</h2>
      <p>Введите ваш @username для входа</p>
      <input type="text" id="reg-username" class="auth-input" placeholder="например: raov">
      <button id="btn-register" class="auth-btn">Войти</button>
    </div>
  </div>

  <!-- Главный экран -->
  <div id="main-screen">
    <div class="app-header">
      <div class="app-title">Соединение...</div>
      <button id="btn-push" style="background:none; border:none; font-size:18px; cursor:pointer;">🔔</button>
    </div>

    <div class="search-container">
      <input type="text" id="target-username" placeholder="Поиск чатов">
      <button id="btn-start-chat">+</button>
    </div>

    <div id="chats-list-vertical"></div>

    <div class="bottom-nav">
      <button class="nav-btn active" id="nav-chats"><span>💬</span>Чаты</button>
      <button class="nav-btn" id="nav-profile"><span>👤</span>Профиль</button>
    </div>
  </div>

  <!-- Экран чата -->
  <div id="chat-screen">
    <div class="chat-header">
      <button class="back-btn" id="btn-back">➔</button>
      <img id="chat-peer-avatar" class="avatar" style="width:36px; height:36px; display:none;">
      <div id="chat-peer-avatar-ph" class="avatar" style="width:36px; height:36px;">?</div>
      <div>
        <div id="chat-peer-title" class="chat-name">@username</div>
        <div style="font-size:12px; color:#64b5f6;">в сети</div>
      </div>
    </div>

    <div id="chat-box"></div>

    <div class="input-bar">
      <input type="text" id="msg-input" placeholder="Написать сообщение...">
      <button id="btn-send">➔</button>
    </div>
  </div>

  <!-- Настройки профиля -->
  <div id="profile-modal">
    <div class="app-header" style="background:transparent; padding:0 0 16px 0;">
      <div class="app-title">Настройки профиля</div>
      <button id="btn-close-profile" style="background:none; border:none; color:#5288c1; font-size:16px;">Закрыть</button>
    </div>
    <div class="profile-card">
      <div id="profile-avatar-ph" class="profile-avatar-preview">?</div>
      <img id="profile-avatar-img" class="profile-avatar-preview" style="display:none;">
      
      <p id="profile-username-text" style="font-weight:600; font-size:18px; color:#fff;"></p>
      
      <input type="text" id="profile-avatar-url" class="auth-input" placeholder="Ссылка на аватарку (URL)">
      <button id="btn-save-profile" class="auth-btn">Сохранить аватарку</button>
    </div>
  </div>

  <script>
    window.onerror = function(msg, url, line) {
      const box = document.getElementById('error-box');
      box.style.display = 'block';
      box.innerHTML += `❌ ${msg} (стр. ${line})<br>`;
    };
  </script>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDoc, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJsk9oUrKLMV0L7tgyxTzMZ-WgRwVgYDA",
      authDomain: "larpessenger.firebaseapp.com",
      projectId: "larpessenger",
      storageBucket: "larpessenger.firebasestorage.app",
      messagingSenderId: "25247732078",
      appId: "1:25247732078:web:cf9fca7a55f452ba1b317f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const messaging = getMessaging(app);
    const vapidKey = "BJ8SpCv5f19isktlc5ZN35BGwV62A1wgqzGBaZn60vKQnnn-z5SLCUs4pn7tkbtDYoWqPcp99aFb066iQ0XQFB8";

    let currentUser = localStorage.getItem("larp_username") || null;
    let activePeer = null;
    let currentRoom = null;
    let unsubscribe = null;
    let myChats = JSON.parse(localStorage.getItem("larp_chats") || "[]");
    let usersCache = {};

    if (currentUser) {
      document.getElementById('auth-screen').style.display = 'none';
      initApp();
    }

    document.getElementById('btn-register').addEventListener('click', () => {
      const input = document.getElementById('reg-username').value.toLowerCase().replace('@', '').trim();
      if (!input) return;

      currentUser = input;
      localStorage.setItem("larp_username", input);

      setDoc(doc(db, "users", input), { username: input }, { merge: true });

      document.getElementById('auth-screen').style.display = 'none';
      initApp();
    });

    function initApp() {
      loadUserData(currentUser);
      renderChatsList();
    }

    async function loadUserData(username) {
      if (usersCache[username]) return usersCache[username];
      try {
        const snap = await getDoc(doc(db, "users", username));
        if (snap.exists()) {
          usersCache[username] = snap.data();
          return snap.data();
        }
      } catch(e) { console.error(e); }
      return null;
    }

    function getPrivateChatId(userA, userB) {
      return [userA.toLowerCase().trim(), userB.toLowerCase().trim()].sort().join("_");
    }

    async function renderChatsList() {
      const container = document.getElementById('chats-list-vertical');
      container.innerHTML = '';

      if (myChats.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding: 40px; color:#7f91a4; font-size:14px;">Нет чатов.<br>Введи @username сверху и нажми +</div>`;
        return;
      }

      for (let user of myChats) {
        const uData = await loadUserData(user);
        const row = document.createElement('div');
        row.className = 'chat-row';
        
        let avatarHtml = `<div class="avatar">${user[0].toUpperCase()}</div>`;
        if (uData && uData.avatarUrl) {
          avatarHtml = `<img src="${uData.avatarUrl}" class="avatar">`;
        }

        row.innerHTML = `
          ${avatarHtml}
          <div class="chat-info">
            <div class="chat-name">@${user}</div>
            <div class="chat-preview">Нажмите, чтобы открыть диалог</div>
          </div>
        `;

        row.onclick = () => openChatWith(user);
        container.appendChild(row);
      }
    }

    async function openChatWith(targetUser) {
      activePeer = targetUser;
      if (!myChats.includes(targetUser) && targetUser !== currentUser) {
        myChats.push(targetUser);
        localStorage.setItem("larp_chats", JSON.stringify(myChats));
      }

      currentRoom = getPrivateChatId(currentUser, targetUser);
      document.getElementById('chat-peer-title').innerText = `@${targetUser}`;

      // Аватар собеседника
      const uData = await loadUserData(targetUser);
      const imgEl = document.getElementById('chat-peer-avatar');
      const phEl = document.getElementById('chat-peer-avatar-ph');
      
      if (uData && uData.avatarUrl) {
        imgEl.src = uData.avatarUrl;
        imgEl.style.display = 'block';
        phEl.style.display = 'none';
      } else {
        phEl.innerText = targetUser[0].toUpperCase();
        phEl.style.display = 'flex';
        imgEl.style.display = 'none';
      }

      document.getElementById('chat-screen').classList.add('active');

      if (unsubscribe) unsubscribe();

      const messagesRef = collection(db, "chats", currentRoom, "messages");
      const q = query(messagesRef, orderBy("timestamp", "asc"));

      unsubscribe = onSnapshot(q, (snapshot) => {
        document.getElementById('chat-box').innerHTML = '';
        snapshot.forEach((doc) => appendMessage(doc.data()));
      });
    }

    // Закрыть чат
    document.getElementById('btn-back').addEventListener('click', () => {
      document.getElementById('chat-screen').classList.remove('active');
      renderChatsList();
    });

    // Отправка сообщений
    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();

      if (text && currentRoom) {
        input.value = '';
        await addDoc(collection(db, "chats", currentRoom, "messages"), {
          text: text,
          author: currentUser,
          timestamp: serverTimestamp()
        });
      }
    }

    function appendMessage(data) {
      const box = document.getElementById('chat-box');
      const isMe = data.author.toLowerCase() === currentUser.toLowerCase();

      const div = document.createElement('div');
      div.className = `msg ${isMe ? 'me' : 'peer'}`;

      let timeStr = "";
      if (data.timestamp) {
        const date = data.timestamp.toDate();
        timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      div.innerHTML = `
        <span class="msg-text"></span>
        <span class="msg-time">${timeStr}</span>
      `;
      div.querySelector('.msg-text').innerText = data.text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    // Поиск
    document.getElementById('btn-start-chat').addEventListener('click', () => {
      const target = document.getElementById('target-username').value.replace('@', '').trim();
      if (target) {
        openChatWith(target);
        document.getElementById('target-username').value = '';
      }
    });

    document.getElementById('btn-send').addEventListener('click', sendMessage);
    document.getElementById('msg-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Профиль
    document.getElementById('nav-profile').addEventListener('click', async () => {
      document.getElementById('profile-modal').classList.add('active');
      document.getElementById('profile-username-text').innerText = `@${currentUser}`;
      
      const myData = await loadUserData(currentUser);
      if (myData && myData.avatarUrl) {
        document.getElementById('profile-avatar-url').value = myData.avatarUrl;
        document.getElementById('profile-avatar-img').src = myData.avatarUrl;
        document.getElementById('profile-avatar-img').style.display = 'block';
        document.getElementById('profile-avatar-ph').style.display = 'none';
      } else {
        document.getElementById('profile-avatar-ph').innerText = currentUser[0].toUpperCase();
      }
    });

    document.getElementById('btn-close-profile').addEventListener('click', () => {
      document.getElementById('profile-modal').classList.remove('active');
    });

    document.getElementById('btn-save-profile').addEventListener('click', async () => {
      const url = document.getElementById('profile-avatar-url').value.trim();
      await setDoc(doc(db, "users", currentUser), { avatarUrl: url }, { merge: true });
      usersCache[currentUser] = { avatarUrl: url };
      alert('Аватарка обновлена!');
      document.getElementById('profile-modal').classList.remove('active');
      renderChatsList();
    });
  </script>
</body>
</html>
