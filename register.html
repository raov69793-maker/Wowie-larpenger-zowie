<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P Chat</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2196f3">
  <!-- Иконка для Safari на iOS -->
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body style="font-family: sans-serif; background: #121212; color: white; padding: 20px;">

  <h1>P2P Мессенджер</h1>
  <p id="status">Проверка PWA...</p>
  <button id="btn-push" style="padding: 10px 20px; font-size: 16px;">Включить уведомления</button>

  <script>
    // Регистрируем Service Worker для PWA и пушей
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => {
          document.getElementById('status').innerText = 'PWA готово к работе!';
        })
        .catch(err => {
          document.getElementById('status').innerText = 'Ошибка SW: ' + err;
        });
    }

    // Запрос разрешения на уведомления
    document.getElementById('btn-push').addEventListener('click', async () => {
      const permission = await Notification.requestPermission();
      if (permission === 'granted') {
        alert('Уведомления разрешены!');
      } else {
        alert('Разрешение отклонено');
      }
    });
  </script>
</body>
</html>
